<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARTS KOREA LAB</title>

</head>

<body>

  <div class="flex justify-center items-center flex-col">

    <!-- 웹 메인비주얼 -->
    <div class="flex justify-start flex-col gap-[16px] px-[20px]">
      <div class="hidden sm_tablet:flex items-center gap-[3%]">
        <img class="w-[68px] sm_tablet:w-[83px] laptop:w-[104px] desktop:w-[120px]"
          src="/assets/imgs/img/keyVisual_1.svg" alt="키비주얼">
        <p
          class="font-clash-rg leading-none whitespace-nowrap text-[65px] sm_tablet:text-[80px] laptop:text-[100px] desktop:text-[115x]">
          ARTS</p>
        <a href="#"
          class="flex justify-between c_purple px-[24px] py-[16px] rounded-full border-2 c_purpleLine hidden laptop:flex laptop:w-[226px] laptop:h-[87px] desktop:w-[260px] desktop:h-[100px]">
          <span class="whitespace-nowrap text-[18px] desktop:text-[20px]">
            <strong>투어</strong> 신청
          </span>
          <div class="flex justify-center items-center bg-white rounded-full w-[50px] h-[50px]">
            <img src="/assets/imgs/icons/arrow.svg" class="w-[20px] h-[20px]" alt="화살표">
          </div>
        </a>
      </div>

      <div class="hidden sm_tablet:flex items-center gap-[2vw]">
        <div class="hidden sm_tablet:inline sm_tablet:w-[28px] laptop:w-[34px]"></div>
        <img src="/assets/imgs/icons/mv_arrow.svg"
          class="hidden sm_tablet:inline sm_tablet:w-[64px] laptop:w-[72px] desktop:w-[80px]" alt="비주얼화살표">
        <img class="w-[68px] sm_tablet:w-[77px] laptop:w-[96px] desktop:w-[110px]"
          src="/assets/imgs/img/keyVisual_2.svg" alt="키비주얼">
        <p
          class="font-clash-rg leading-none whitespace-nowrap text-[65px] sm_tablet:text-[80px] laptop:text-[100px] desktop:text-[115]">
          KOREA</p>
        <a href="#"
          class="flex justify-between c_mint px-[24px] py-[16px] rounded-full border-2 c_mintLine hidden laptop:flex laptop:w-[226px] laptop:h-[87px] desktop:w-[260px] desktop:h-[100px]">
          <span class="text-[18px] desktop:text-[20px]"><strong>대관·시설</strong> 신청</span>
          <div class="flex justify-center items-center bg-white rounded-full w-[50px] h-[50px]">
            <img src="/assets/imgs/icons/arrow.svg" class="w-[20px] h-[20px]" alt="화살표">
          </div>
        </a>
      </div>

      <div class="hidden sm_tablet:flex items-center gap-[2vw]">
        <div class="hidden sm_tablet:inline sm_tablet:w-[152px] laptop:w-[176px] desktop:w-[204px]"></div>
        <img class="hidden sm_tablet:inline sm_tablet:w-[64px] laptop:w-[72px] desktop:w-[80px]"
          src="/assets/imgs/icons/mv_arrow.svg" alt="비주얼화살표">
        <img class="w-[163px] sm_tablet:w-[200px] laptop:w-[250px] desktop:w-[288px]"
          src="/assets/imgs/img/keyVisual_5.svg" alt="키비주얼">
        <p
          class="font-clash-sb leading-none whitespace-nowrap text-[65px] sm_tablet:text-[80px] laptop:text-[100px] desktop:text-[115px]">
          LAB</p>
        <a href="#"
          class="flex justify-between c_yellow px-[24px] py-[16px] rounded-full border-2 c_yellowLine hidden laptop:flex laptop:w-[226px] laptop:h-[87px] desktop:w-[260px] desktop:h-[100px]">
          <span class="text-[18px] desktop:text-[20px]"><strong>비즈 컨설팅</strong> 신청</span>
          <div class="flex justify-center items-center bg-white rounded-full w-[50px] h-[50px]">
            <img src="/assets/imgs/icons/arrow.svg" class="w-[20px] h-[20px]" alt="화살표">
          </div>
        </a>
      </div>

      <!-- 모바일 메인비주얼 -->
      <div class="block sm_tablet:hidden px-[20px]">
        <div class="flex gap-[12px]">
          <p class="font-clash-rg leading-none whitespace-nowrap text-[55px]">
            ARTS</p>
          <div class="flex">
            <div class="flex gap-[6px]">
              <img class="w-[50px]" src="/assets/imgs/img/keyVisual_1.svg" alt="키비주얼">
              <img class="w-[50px]" src="/assets/imgs/img/keyVisual_2.svg" alt="키비주얼">
              <img class="w-[50px]" src="/assets/imgs/img/keyVisual_3svg.svg" alt="키비주얼">
            </div>
          </div>
        </div>
        <p class="font-clash-rg leading-none whitespace-nowrap text-[55px]">
          KOREA <span class="font-clash-sb">LAB</span></p>
      </div>
    </div>

    <!-- 웹 캘린더  -->
    <div class="hidden sm_tablet:flex flex-col w-full px-[20px] justify-center gap-[24px] items-center">
      <div class="flex flex-col gap-[8px]">
        <h1 class="text-[24px] font-medium"><span id="current-month" class="c_blueFont font-inter font-bold"></span>월
          공유오피스 운영 안내</h1>
        <div class="flex gap-[2px]">
          <img class="w-[13px]" src="/assets/imgs/icons/info.svg" alt="정보">
          <p class="c_darkGrayFont text-[15px]">주말을 포함한 모든 공휴일은 휴관입니다.</p>
        </div>
      </div>

      <div
        class="flex justify-center w-full px-[24px] py-[16px] max-w-[1240px] c_blueLine border-2 rounded-full overflow-hidden">
        <div id="date-bar" class="flex w-full justify-between overflow-x-auto pb-[12px] mb-[-12px]">
        </div>
      </div>
    </div>

    <!-- 모바일 캘린더 -->
    <section
      class="flex flex-col items-center sm_tablet:hidden w-full rounded-tl-[40px] rounded-tr-[40px] c_lightBlue px-[20px] py-[24px] gap-[24px]"
      aria-label="공유오피스 운영 캘린더">
      <div class="flex w-full max-w-[200px] justify-between px-[16px] py-[12px] rounded-full bg-white/30"
        aria-label="범례">
        <div class="flex gap-[12px] text-[15px] items-center">
          <div class="w-[18px] h-[18px] c_blue rounded-full"></div>
          <p>=</p>
          <p>행사</p>
        </div>
        <div class="flex gap-[12px] text-[15px] items-center">
          <div class="w-[18px] h-[18px] c_disabledGrayStroke rounded-full"></div>
          <p>=</p>
          <p>휴관</p>
        </div>
      </div>

      <div class="px-[16px] py-[16px] bg-white rounded-[26px] w-full">
        <div class="grid grid-cols-7 border-b-[1px] c_blueLine pb-[16px]">
          <span class="py-2 text-center c_dateGray font-medium">SUN</span>
          <span class="py-2 text-center font-medium">MON</span>
          <span class="py-2 text-center font-medium">TUE</span>
          <span class="py-2 text-center font-medium">WED</span>
          <span class="py-2 text-center font-medium">THU</span>
          <span class="py-2 text-center font-medium">FRI</span>
          <span class="py-2 text-center c_dateGray">SAT</span>
        </div>

        <div id="mobile-calendar-grid" class="grid grid-cols-7 gap-y-5 pt-[16px]">
          <!-- 동적으로 렌더링됨 -->
        </div>
      </div>
    </section>


  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
