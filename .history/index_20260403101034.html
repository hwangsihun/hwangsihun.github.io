<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARTS KOREA LAB</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>

<body class="page_body">
  <main class="snap_page">
    <section id="main-1" class="snap_section flex_aic bdt">
      <div class="section_container w100 maxw1240 mx_auto">
        <div class="section_content w100 flex col gap24">
          <p class="section_eyebrow fs16 fw600 ls_p08">SECTION 01</p>
          <h1 class="section_title fs48 fw700 lh12">Main 1</h1>
          <p class="section_text fs20 lh16 break_keep">스크롤 스냅 기본 구조가 들어간 첫 번째 섹션입니다.</p>
        </div>
      </div>
    </section>

    <section id="main-2" class="snap_section flex_aic bdt">
      <div class="section_container w100 maxw1240 mx_auto">
        <div class="section_content w100 flex col gap24">
          <p class="section_eyebrow fs16 fw600 ls_p08">SECTION 02</p>
          <h2 class="section_title fs48 fw700 lh12">Main 2</h2>
          <p class="section_text fs20 lh16 break_keep">각 섹션 내부 콘텐츠는 전체 컨테이너 너비를 그대로 따라가도록 구성했습니다.</p>
        </div>
      </div>
    </section>

    <section id="main-3" class="snap_section flex_aic bdt">
      <div class="section_container w100 maxw1240 mx_auto">
        <div class="section_content w100 flex col gap24">
          <p class="section_eyebrow fs16 fw600 ls_p08">SECTION 03</p>
          <h2 class="section_title fs48 fw700 lh12">Main 3</h2>
          <p class="section_text fs20 lh16 break_keep">이 구역부터는 실제 콘텐츠를 이어서 얹기만 하면 되는 공통 껍데기입니다.</p>
        </div>
      </div>
    </section>

    <section id="main-4" class="snap_section flex_aic bdt">
      <div class="section_container w100 maxw1240 mx_auto">
        <div class="section_content w100 flex col gap24">
          <p class="section_eyebrow fs16 fw600 ls_p08">SECTION 04</p>
          <h2 class="section_title fs48 fw700 lh12">Main 4</h2>
          <p class="section_text fs20 lh16 break_keep">모든 섹션은 현재 화면 높이 기준 `100dvh`로 맞춰져 스냅됩니다.</p>
        </div>
      </div>
    </section>

    <section id="main-5" class="snap_section flex_aic bdt">
      <div class="section_container w100 maxw1240 mx_auto">
        <div class="section_content w100 flex col gap24">
          <p class="section_eyebrow fs16 fw600 ls_p08">SECTION 05</p>
          <h2 class="section_title fs48 fw700 lh12">Main 5</h2>
          <p class="section_text fs20 lh16 break_keep">상단 보더와 반응형 좌우 여백도 공통 규칙으로 동일하게 적용됩니다.</p>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script type="module" src="/src/main.js"></script>

</html>
