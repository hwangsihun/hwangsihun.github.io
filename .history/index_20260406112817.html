<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARTS KOREA LAB</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>

<body class="page_body">
  <main class="snap_page flex_c" data-snap-duration="800">


    <section id="main-1" class="flex_cb snap_section">
      <div class="flex_cb container_visual_calendar">
        <div class="flex_cb container_visual_pc">

          <div class="flex wrapper_visual_pc">
            <img class="icon_visual1" src="/assets/imgs/img/keyVisual_1.svg" alt="키비주얼1">
            <p class="font-clash-rg">ARTS</p>
            <div class="btn_visual flex_b bg_purple line_purple">
              <span><strong>투어</strong> 신청</span>
              <button class="flex_r quick_link bg_white"></button>
            </div>
          </div>

          <div class="flex wrapper_visual_pc">
            <img class="icon_arrow1" src="/assets/imgs/icons/mv_arrow.svg" alt="화살표장식">
            <img class="icon_visual2" src="/assets/imgs/img/keyVisual_2.svg" alt="키비주얼2">
            <p class="font-clash-rg">KOREA</p>
            <div class="btn_visual flex_b bg_mint line_mint">
              <span><strong>대관·시설</strong> 신청</span>
              <button class="flex_r quick_link bg_white"></button>
            </div>
          </div>

          <div class="flex wrapper_visual_pc">
            <img class="icon_arrow2" src="/assets/imgs/icons/mv_arrow.svg" alt="화살표장식">
            <img class="icon_visual3" src="/assets/imgs/img/keyVisual_5.svg" alt="키비주얼5">
            <p class="font-clash-sb">LAB</p>
            <div class="btn_visual flex_b bg_yellow line_yellow">
              <span><strong>비즈컨설팅</strong> 신청</span>
              <button class="flex_r quick_link bg_white"></button>
            </div>
          </div>

          <section class="container_calendar_pc flex_c">
            <div class="wrapper_calendar_pc flex_c">
              <h2 class="title_calendar_pc"><span class="text_month_calendar_pc current-month font_mint">1</span>월 공유오피스
                운영 안내
              </h2>

              <div class="meta_calendar_pc flex_rb">
                <p class="notice_calendar_pc flex">
                  <span class="icon_notice_calendar_pc flex_r bg_darkGray text_white">i</span>
                  토요일과 일요일을 포함한 모든 공휴일은 휴관입니다.
                </p>

                <div class="legend_calendar_pc flex">
                  <span class="item_legend_calendar_pc flex">
                    <span class="dot_legend_calendar_pc bg_mint"></span>
                    = 행사
                  </span>
                  <span class="item_legend_calendar_pc flex">
                    <span class="dot_legend_calendar_pc bg_lightGray"></span>
                    = 휴관
                  </span>
                </div>
              </div>
            </div>

            <div class="frame_calendar_pc">
              <div class="viewport_calendar_pc">
                <ol class="track_calendar_pc flex_rb"></ol>
              </div>
            </div>
          </section>
        </div>

        <div class="flex_c container_visual_mobile">
          <div class="flex wrapper_visual_mobile">
            <p class="font-clash-rg">ARTS</p>
            <img class="icon_visual_mobile" src="/assets/imgs/img/keyVisual_1.svg" alt="키비주얼1">
            <img class="icon_visual_mobile" src="/assets/imgs/img/keyVisual_2.svg" alt="키비주얼2">
            <img class="icon_visual_mobile" src="/assets/imgs/img/keyVisual_3.svg" alt="키비주얼3">
          </div>

          <div class="flex wrapper_visual_mobile">
            <p class="font-clash-rg">KOREA</p>
            <p class="text_visual_mobile_lab font-clash-sb">LAB</p>
          </div>
        </div>

      </div>
    </section>

    <section id="main-2" class="snap_section">
      <div class="w100 h100 bg_black"></div>
    </section>

    <section id="main-2" class="snap_section">
      <div class="w100 h100 bg_black"></div>
    </section>

    <section id="main-2" class="snap_section">
      <div class="w100 h100 bg_black"></div>
    </section>

    <section id="main-2" class="snap_section">
      <div class="w100 h100 bg_black"></div>
    </section>

    <section id="main-2" class="snap_section">
      <div class="w100 h100 bg_black"></div>
    </section>

    <section id="main-2" class="snap_section">
      <div class="w100 h100 bg_black"></div>
    </section>


  </main>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
