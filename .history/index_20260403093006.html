<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARTS KOREA LAB</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>

<body class="page_body">
  <div class="page_wrap">
    <section id="main-1" class="main1">
      <div class="main1_inner">
        <div class="main1_visual_block">
          <div class="main1_row">
            <img class="w68px" src="/assets/imgs/img/keyVisual_1.svg" alt="visual 1">
            <p class="font_clash_rg fs65 lh1 nowrap">ARTS</p>
            <a href="#" class="main1_request_btn c_purple c_purpleLine w226px h87">
              <span class="fs18"><strong>수어</strong> 신청</span>
              <span class="main1_request_arrow"><img class="w20px h20" src="/assets/imgs/icons/arrow.svg" alt="arrow"></span>
            </a>
          </div>

          <div class="main1_row main1_row_second">
            <span class="main1_spacer_sm"></span>
            <img class="w64px" src="/assets/imgs/icons/mv_arrow.svg" alt="arrow">
            <img class="w68px" src="/assets/imgs/img/keyVisual_2.svg" alt="visual 2">
            <p class="font_clash_rg fs65 lh1 nowrap">KOREA</p>
            <a href="#" class="main1_request_btn c_mint c_mintLine w226px h87">
              <span class="fs18"><strong>대관·시설</strong> 신청</span>
              <span class="main1_request_arrow"><img class="w20px h20" src="/assets/imgs/icons/arrow.svg" alt="arrow"></span>
            </a>
          </div>

          <div class="main1_row main1_row_third">
            <span class="main1_spacer_md"></span>
            <img class="w64px" src="/assets/imgs/icons/mv_arrow.svg" alt="arrow">
            <img class="w163px" src="/assets/imgs/img/keyVisual_5.svg" alt="visual 5">
            <p class="font_clash_sb fs65 lh1 nowrap">LAB</p>
            <a href="#" class="main1_request_btn c_yellow c_yellowLine w226px h87">
              <span class="fs18"><strong>비즈 컨설팅</strong> 신청</span>
              <span class="main1_request_arrow"><img class="w20px h20" src="/assets/imgs/icons/arrow.svg" alt="arrow"></span>
            </a>
          </div>

          <div class="mobile_visual">
            <div class="flex gap12">
              <p class="font_clash_rg fs55 lh1 nowrap">ARTS</p>
              <div class="mobile_visual_icons">
                <img class="w50px" src="/assets/imgs/img/keyVisual_1.svg" alt="visual 1">
                <img class="w50px" src="/assets/imgs/img/keyVisual_2.svg" alt="visual 2">
                <img class="w50px" src="/assets/imgs/img/keyVisual_3.svg" alt="visual 3">
              </div>
            </div>
            <p class="font_clash_rg fs55 lh1 nowrap">KOREA <span class="font_clash_sb">LAB</span></p>
          </div>
        </div>

        <div class="calendar_desktop">
          <div class="calendar_desktop_head">
            <h1 class="fs24 fw500"><span class="current-month c_blueFont font_inter fw700"></span>월 공유오피스 운영 안내</h1>
            <div class="flex gap4">
              <img class="w13px" src="/assets/imgs/icons/info.svg" alt="info">
              <p class="c_darkGrayFont fs15">주말을 포함한 모든 공유일자 가능합니다.</p>
            </div>
          </div>

          <div class="calendar_bar">
            <div id="date-bar" class="flex jsb w100 overflow_x_auto pb12"></div>
          </div>
        </div>

        <div class="calendar_mobile">
          <h2 class="fs24 fw500"><span class="current-month c_blueFont font_inter fw700"></span>월 공유오피스 운영 안내</h2>
          <section class="calendar_mobile_panel">
            <div class="calendar_mobile_toggle flex_jsb">
              <div class="flex gap12 aic fs15">
                <div class="w18px h18 c_blue rfull"></div>
                <p>=</p>
                <p>대사</p>
              </div>
              <div class="flex gap12 aic fs15">
                <div class="w18px h18 c_disabledGrayStroke rfull"></div>
                <p>=</p>
                <p>대관</p>
              </div>
            </div>

            <div class="calendar_mobile_card">
              <div class="calendar_week_row">
                <span class="calendar_week_label c_dateGray">SUN</span>
                <span class="calendar_week_label">MON</span>
                <span class="calendar_week_label">TUE</span>
                <span class="calendar_week_label">WED</span>
                <span class="calendar_week_label">THU</span>
                <span class="calendar_week_label">FRI</span>
                <span class="calendar_week_label c_dateGray">SAT</span>
              </div>
              <div id="mobile-calendar-grid" class="calendar_mobile_grid"></div>
            </div>
          </section>
        </div>
      </div>
    </section>

    <section id="main-2" class="main2">
      <div class="main2_hero">
        <div class="main2_hero_copy">
          <h1 class="font_clash_rg fs36 lh12">ARTS KOREA LAB <br><span class="font_clash_sb fs44">NOW</span></h1>
          <img class="w374px" src="/assets/imgs/img/keyVisual_4.svg" alt="key visual 4">
        </div>

        <div class="flex gap20">
          <div class="main2_controls" data-swiper-controls>
            <div data-icon="prev" data-label="previous slide"></div>
            <div data-icon="stop" data-label="pause slide"></div>
            <div data-icon="next" data-label="next slide"></div>
          </div>

          <div class="main2_swiper_wrap">
            <div class="main2-swiper swiper-container">
              <div class="swiper-wrapper">
                <div class="swiper-slide">
                  <img src="/assets/imgs/img/example_1.png" alt="example slide 1">
                </div>
                <div class="swiper-slide">
                  <img src="/assets/imgs/img/example_2.png" alt="example slide 2">
                </div>
                <div class="swiper-slide">
                  <img src="/assets/imgs/img/example_3.png" alt="example slide 3">
                </div>
              </div>
              <div class="main2-swiper-pagination swiper-pagination hidden"></div>
            </div>

            <div class="main2_progress_row">
              <div class="main2_progress_track main2-swiper-progress">
                <span class="main2_progress_fill main2-swiper-progress-fill"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
