  <!-- 캘린더 -->
  <div class="flex justify-center mt-10">
    <div id="calendar" class="grid grid-cols-7 gap-1 w-full max-w-[600px]"></div>
  </div>

  <script>
    const calendarEl = document.getElementById('calendar');
    const today = new Date();
    let currentMonth = new Date(today.getFullYear(), today.getMonth(), 1);

    // 월 지나가면 자동 다음 월
    if (today.getMonth() > currentMonth.getMonth() || today.getFullYear() > currentMonth.getFullYear()) {
      currentMonth.setMonth(currentMonth.getMonth() + 1);
    }

    // 해당 월 일수 계산
    const getDaysInMonth = (date) => {
      const year = date.getFullYear();
      const month = date.getMonth();
      return new Array(new Date(year, month + 1, 0).getDate())
        .fill(0)
        .map((_, i) => new Date(year, month, i + 1));
    }

    // 예시: 백에서 받아온 데이터 날짜
    const highlightDates = ['2026-03-20', '2026-03-23'];

    // 캘린더 렌더링
    getDaysInMonth(currentMonth).forEach(d => {
      const dayDiv = document.createElement('div');
      dayDiv.classList.add('p-2', 'text-center', 'rounded');

      const isToday = d.toDateString() === today.toDateString();
      const isWeekend = [0, 6].includes(d.getDay());
      const isHighlighted = highlightDates.includes(d.toISOString().slice(0, 10));

      if (isToday) dayDiv.classList.add('bg-blue-500', 'text-white');
      if (isWeekend) dayDiv.classList.add('text-red-500');
      if (isHighlighted) dayDiv.classList.add('bg-yellow-300');

      dayDiv.textContent = d.getDate();
      calendarEl.appendChild(dayDiv);
    });
  </script>

</body>
