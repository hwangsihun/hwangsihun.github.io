          </div>
        </a>
      </div>

      <div class="flex items-center gap-[2vw]">
        <div class="hidden sm_tablet:inline sm_tablet:w-[28px] laptop:w-[34px]"></div>
        <img src="/assets/imgs/icons/mv_arrow.svg"
          class="hidden sm_tablet:inline sm_tablet:w-[64px] laptop:w-[72px] desktop:w-[80px]" alt="비주얼화살표">
        <img class="w-[68px] sm_tablet:w-[77px] laptop:w-[96px] desktop:w-[110px]"
          src="/assets/imgs/img/keyVisual_2.svg" alt="키비주얼">
        <p
          class="font-clash-rg leading-none whitespace-nowrap text-[65px] sm_tablet:text-[80px] laptop:text-[100px] desktop:text-[115]">
          KOREA</p>
        <a href="#"
          class="flex justify-between c_mint px-[24px] py-[16px] rounded-full border-2 c_mintLine hidden laptop:flex laptop:w-[226px] laptop:h-[87px] desktop:w-[260px] desktop:h-[100px]">
          <span class="text-[18px] desktop:text-[20px]"><strong>대관·시설</strong> 신청</span>
          <div class="flex justify-center items-center bg-white rounded-full w-[50px] h-[50px]">
            <img src="/assets/imgs/icons/arrow.svg" class="w-[20px] h-[20px]" alt="화살표">
          </div>
        </a>
      </div>

      <div class="flex items-center gap-[2vw]">
        <div class="hidden sm_tablet:inline sm_tablet:w-[152px] laptop:w-[176px] desktop:w-[204px]"></div>
        <img class="hidden sm_tablet:inline sm_tablet:w-[64px] laptop:w-[72px] desktop:w-[80px]"
          src="/assets/imgs/icons/mv_arrow.svg" alt="비주얼화살표">
        <img class="w-[163px] sm_tablet:w-[200px] laptop:w-[250px] desktop:w-[288px]"
          src="/assets/imgs/img/keyVisual_5.svg" alt="키비주얼">
        <p
          class="font-clash-sb leading-none whitespace-nowrap text-[65px] sm_tablet:text-[80px] laptop:text-[100px] desktop:text-[115px]">
          LAB</p>
        <a href="#"
          class="flex justify-between c_yellow px-[24px] py-[16px] rounded-full border-2 c_yellowLine hidden laptop:flex laptop:w-[226px] laptop:h-[87px] desktop:w-[260px] desktop:h-[100px]">
          <span class="text-[18px] desktop:text-[20px]"><strong>비즈 컨설팅</strong> 신청</span>
          <div class="flex justify-center items-center bg-white rounded-full w-[50px] h-[50px]">
            <img src="/assets/imgs/icons/arrow.svg" class="w-[20px] h-[20px]" alt="화살표">
          </div>
        </a>
      </div>

    </div>

    <!-- 캘린더 -->
    <div class="overflow-x-auto py-4">
      <div id="date-bar" class="flex gap-2 min-w-max px-2">
      </div>
    </div>

    <script>
      const dateBar = document.getElementById('date-bar');
      const today = new Date();
      const currentMonth = today.getMonth();
      const currentYear = today.getFullYear();

      const getDaysInMonth = (year, month) => {
        const days = [];
        const date = new Date(year, month, 1);
        while (date.getMonth() === month) {
          days.push(new Date(date));
          date.setDate(date.getDate() + 1);
        }
        return days;
      }

      const highlightDates = ['2026-03-05', '2026-03-09', '2026-03-16', '2026-03-23', '2026-03-30'];

      getDaysInMonth(currentYear, currentMonth).forEach(d => {
        const dayDiv = document.createElement('div');
        dayDiv.classList.add('flex', 'flex-col', 'items-center', 'justify-center', 'w-12', 'h-12', 'rounded-full', 'text-sm', 'cursor-pointer');

        const dayOfWeek = d.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
        const dateStr = d.getDate();

        if ([0, 6].includes(d.getDay())) dayDiv.classList.add('text-gray-400');
        if (d.toDateString() === today.toDateString()) dayDiv.classList.add('bg-blue-500', 'text-white');
        if (highlightDates.includes(d.toISOString().slice(0, 10))) dayDiv.classList.add('bg-blue-100', 'text-blue-700');

        const dayNameDiv = document.createElement('div');
        dayNameDiv.textContent = dayOfWeek;
        dayNameDiv.classList.add('text-xs', 'mb-1');

        const dateDiv = document.createElement('div');
        dateDiv.textContent = dateStr;
        dateDiv.classList.add('text-base', 'font-semibold');

        dayDiv.appendChild(dayNameDiv);
        dayDiv.appendChild(dateDiv);
        dateBar.appendChild(dayDiv);

        if (d.getDay() === 0) {
          const separator = document.createElement('div');
          separator.classList.add('w-[1px]', 'h-11', 'border-r', 'border-dashed', 'border-gray-300');
          dateBar.appendChild(separator);
        }
      });
    </script>

  </div>

</body>

</html>
